<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師後台 | 進度與卡片管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Noto Sans TC", sans-serif;
            background: linear-gradient(180deg, #f8fbff 0%, #eef7ff 100%);
        }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <header class="sticky top-0 z-40 border-b border-sky-100 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-6 py-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <div class="text-sm font-black tracking-wide text-sky-600">Teacher Admin</div>
                <h1 class="text-2xl font-black text-slate-900 md:text-3xl">教師後台</h1>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <div id="auth-status" class="rounded-full border border-sky-100 bg-sky-50 px-3 py-2 text-sm font-bold text-slate-700">
                    尚未登入
                </div>
                <button id="login-btn" class="rounded-xl border-2 border-sky-300 px-4 py-2 font-black text-sky-700 transition hover:bg-sky-50">
                    <i class="fa-brands fa-google mr-1"></i> Google 登入
                </button>
                <button id="logout-btn" class="hidden rounded-xl bg-slate-800 px-4 py-2 font-black text-white transition hover:bg-slate-700">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> 登出
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl space-y-6 px-6 py-8">
        <section id="notice-panel" class="hidden rounded-2xl border px-5 py-4 text-sm font-bold"></section>

        <section class="rounded-3xl border border-sky-100 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                <div>
                    <h2 class="text-xl font-black text-slate-900">進度查詢</h2>
                    <p class="mt-1 text-sm font-bold text-slate-500">可依週次、活動類型、完成狀態與 email 搜尋學生資料。</p>
                </div>
                <button id="refresh-btn" class="rounded-xl bg-sky-600 px-4 py-2 font-black text-white transition hover:bg-sky-500">
                    <i class="fa-solid fa-rotate mr-1"></i> 重新整理
                </button>
            </div>

            <div class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-5">
                <label class="block">
                    <span class="mb-1 block text-sm font-black text-slate-700">週次</span>
                    <select id="week-filter" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 font-bold text-slate-700">
                        <option value="">全部週次</option>
                    </select>
                </label>
                <label class="block">
                    <span class="mb-1 block text-sm font-black text-slate-700">活動類型</span>
                    <select id="activity-filter" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 font-bold text-slate-700">
                        <option value="">全部類型</option>
                        <option value="typing">typing</option>
                        <option value="quiz">quiz</option>
                        <option value="project">project</option>
                        <option value="other">other</option>
                    </select>
                </label>
                <label class="block">
                    <span class="mb-1 block text-sm font-black text-slate-700">完成狀態</span>
                    <select id="completed-filter" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 font-bold text-slate-700">
                        <option value="">全部狀態</option>
                        <option value="false">進行中</option>
                        <option value="true">已完成</option>
                    </select>
                </label>
                <label class="block xl:col-span-2">
                    <span class="mb-1 block text-sm font-black text-slate-700">搜尋</span>
                    <input id="search-filter" type="text" placeholder="搜尋 email 或 activity_key" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 font-bold text-slate-700">
                </label>
            </div>
        </section>

        <section class="rounded-3xl border border-sky-100 bg-white p-6 shadow-sm">
            <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="text-xl font-black text-slate-900">首頁週卡片顯示管理</h2>
                    <p class="mt-1 text-sm font-bold text-slate-500">控制三年級與六年級首頁要不要顯示某一張週卡片。</p>
                </div>
            </div>
            <div class="mt-5 grid gap-6 lg:grid-cols-2">
                <div class="rounded-2xl border border-teal-100 bg-teal-50/60 p-5">
                    <h3 class="mb-4 text-lg font-black text-teal-800">三年級卡片</h3>
                    <div id="grade3-visibility-list" class="space-y-3"></div>
                </div>
                <div class="rounded-2xl border border-purple-100 bg-purple-50/60 p-5">
                    <h3 class="mb-4 text-lg font-black text-purple-800">六年級卡片</h3>
                    <div id="grade6-visibility-list" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <section class="overflow-hidden rounded-3xl border border-sky-100 bg-white shadow-sm">
            <div class="border-b border-slate-100 px-6 py-4">
                <h2 class="text-xl font-black text-slate-900">學生進度總表</h2>
                <p id="summary-text" class="mt-1 text-sm font-bold text-slate-500">尚未讀取資料</p>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-50 text-slate-600">
                        <tr>
                            <th class="px-4 py-3 text-left font-black">學生</th>
                            <th class="px-4 py-3 text-left font-black">週次</th>
                            <th class="px-4 py-3 text-left font-black">活動</th>
                            <th class="px-4 py-3 text-left font-black">類型</th>
                            <th class="px-4 py-3 text-left font-black">目前進度</th>
                            <th class="px-4 py-3 text-left font-black">分數</th>
                            <th class="px-4 py-3 text-left font-black">狀態</th>
                            <th class="px-4 py-3 text-left font-black">最後更新</th>
                            <th class="px-4 py-3 text-left font-black">操作</th>
                        </tr>
                    </thead>
                    <tbody id="progress-tbody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="9" class="px-4 py-12 text-center font-bold text-slate-400">請先登入教師帳號</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        const SUPABASE_URL = "https://upxgyusodibaqcrocdzj.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_VhqRaRCR5m4VRuCqTMXToA_XgeCgl5j";
        const TEACHER_EMAILS = ["chianwu@gmail.com"];
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        const authStatusEl = document.getElementById("auth-status");
        const loginBtn = document.getElementById("login-btn");
        const logoutBtn = document.getElementById("logout-btn");
        const weekFilterEl = document.getElementById("week-filter");
        const activityFilterEl = document.getElementById("activity-filter");
        const completedFilterEl = document.getElementById("completed-filter");
        const searchFilterEl = document.getElementById("search-filter");
        const refreshBtn = document.getElementById("refresh-btn");
        const tbodyEl = document.getElementById("progress-tbody");
        const summaryTextEl = document.getElementById("summary-text");
        const noticePanelEl = document.getElementById("notice-panel");
        const visibilityLists = {
            grade3: document.getElementById("grade3-visibility-list"),
            grade6: document.getElementById("grade6-visibility-list")
        };

        const visibilityDefaults = {
            grade3: ["03", "04", "05", "06"],
            grade6: ["03", "04", "05", "06"]
        };

        let currentSession = null;

        function getAdminRedirectUrl() {
            return `${window.location.origin}/admin-progress.html`;
        }

        function initWeekOptions() {
            for (let i = 1; i <= 15; i += 1) {
                const week = String(i).padStart(2, "0");
                const option = document.createElement("option");
                option.value = week;
                option.textContent = `第 ${week} 週`;
                weekFilterEl.appendChild(option);
            }
        }

        function isTeacher(session) {
            const email = session?.user?.email?.toLowerCase() || "";
            return TEACHER_EMAILS.includes(email);
        }

        function showNotice(message, tone = "info") {
            const toneClass = {
                info: "bg-sky-50 border-sky-200 text-sky-700",
                error: "bg-rose-50 border-rose-200 text-rose-700",
                success: "bg-emerald-50 border-emerald-200 text-emerald-700"
            };
            noticePanelEl.className = `rounded-2xl border px-5 py-4 text-sm font-bold ${toneClass[tone] || toneClass.info}`;
            noticePanelEl.textContent = message;
            noticePanelEl.classList.remove("hidden");
        }

        function hideNotice() {
            noticePanelEl.classList.add("hidden");
        }

        function activityLabel(activityKey) {
            if (activityKey.startsWith("typing")) return "中打闖關";
            if (activityKey.startsWith("quiz")) return "測驗";
            if (activityKey.startsWith("project")) return "專案";
            return activityKey;
        }

        function progressLabel(row) {
            if (row.activity_type === "typing") {
                return row.completed ? `第 ${row.current_level}/5 關（完成）` : `第 ${row.current_level}/5 關`;
            }
            if (row.activity_type === "quiz") {
                return row.completed ? "已作答" : "未完成";
            }
            return row.completed ? "已完成" : "-";
        }

        function statusBadge(row) {
            return row.completed
                ? '<span class="inline-flex rounded-full bg-emerald-100 px-3 py-1 font-black text-emerald-700">已完成</span>'
                : '<span class="inline-flex rounded-full bg-amber-100 px-3 py-1 font-black text-amber-700">進行中</span>';
        }

        function formatTime(value) {
            return new Date(value).toLocaleString("zh-TW", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function renderVisibilityControls(rows = []) {
            const visibilityMap = new Map(rows.map((row) => [`${row.grade}-${row.week_code}`, row]));

            Object.entries(visibilityDefaults).forEach(([grade, weeks]) => {
                const target = visibilityLists[grade];
                target.innerHTML = weeks.map((weekCode) => {
                    const row = visibilityMap.get(`${grade}-${weekCode}`);
                    const isVisible = row ? row.is_visible : true;
                    const updatedAt = row?.updated_at ? formatTime(row.updated_at) : "尚未設定";
                    const stateClass = isVisible
                        ? "bg-emerald-100 text-emerald-700"
                        : "bg-slate-200 text-slate-600";
                    const btnClass = isVisible
                        ? "bg-rose-500 hover:bg-rose-400"
                        : "bg-emerald-500 hover:bg-emerald-400";
                    const btnLabel = isVisible ? "隱藏" : "顯示";

                    return `
                        <div class="flex items-center justify-between gap-3 rounded-2xl border border-white bg-white/80 px-4 py-3">
                            <div>
                                <div class="font-black text-slate-800">第 ${weekCode} 週</div>
                                <div class="text-xs font-bold text-slate-400">最後更新：${updatedAt}</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="inline-flex rounded-full px-3 py-1 text-sm font-black ${stateClass}">
                                    ${isVisible ? "顯示中" : "隱藏中"}
                                </span>
                                <button
                                    class="visibility-toggle rounded-xl px-3 py-2 font-black text-white transition ${btnClass}"
                                    data-grade="${grade}"
                                    data-week-code="${weekCode}"
                                    data-next-visible="${(!isVisible).toString()}">
                                    ${btnLabel}
                                </button>
                            </div>
                        </div>
                    `;
                }).join("");
            });

            document.querySelectorAll(".visibility-toggle").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const grade = btn.dataset.grade;
                    const weekCode = btn.dataset.weekCode;
                    const nextVisible = btn.dataset.nextVisible === "true";
                    btn.disabled = true;

                    const { error } = await supabase.rpc("admin_set_week_visibility", {
                        p_grade: grade,
                        p_week_code: weekCode,
                        p_is_visible: nextVisible
                    });

                    if (error) {
                        showNotice(`卡片狀態更新失敗：${error.message}`, "error");
                        btn.disabled = false;
                        return;
                    }

                    const gradeLabel = grade === "grade3" ? "三年級" : "六年級";
                    showNotice(`已更新 ${gradeLabel} 第 ${weekCode} 週卡片狀態。`, "success");
                    await loadWeekVisibility();
                });
            });
        }

        function renderRows(rows) {
            if (!rows.length) {
                tbodyEl.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-4 py-12 text-center font-bold text-slate-400">目前沒有符合條件的資料</td>
                    </tr>
                `;
                summaryTextEl.textContent = "目前沒有符合條件的資料";
                return;
            }

            tbodyEl.innerHTML = rows.map((row) => `
                <tr class="hover:bg-slate-50">
                    <td class="px-4 py-4 font-bold text-slate-800">${row.email}</td>
                    <td class="px-4 py-4 font-bold text-slate-600">${row.week_code}</td>
                    <td class="px-4 py-4">
                        <div class="font-black text-slate-800">${activityLabel(row.activity_key)}</div>
                        <div class="text-xs font-bold text-slate-400">${row.activity_key}</div>
                    </td>
                    <td class="px-4 py-4 font-bold text-slate-600">${row.activity_type}</td>
                    <td class="px-4 py-4 font-bold text-slate-700">${progressLabel(row)}</td>
                    <td class="px-4 py-4 font-black text-slate-700">${row.score ?? "-"}</td>
                    <td class="px-4 py-4">${statusBadge(row)}</td>
                    <td class="px-4 py-4 font-bold text-slate-500">${formatTime(row.updated_at)}</td>
                    <td class="px-4 py-4">
                        <button
                            class="reset-btn rounded-xl bg-rose-500 px-3 py-2 font-black text-white transition hover:bg-rose-400"
                            data-user-id="${row.user_id}"
                            data-week-code="${row.week_code}"
                            data-activity-key="${row.activity_key}">
                            重設
                        </button>
                    </td>
                </tr>
            `).join("");

            summaryTextEl.textContent = `共 ${rows.length} 筆資料`;

            tbodyEl.querySelectorAll(".reset-btn").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    const userId = btn.dataset.userId;
                    const weekCode = btn.dataset.weekCode;
                    const activityKey = btn.dataset.activityKey;
                    const confirmed = window.confirm(`要重設第 ${weekCode} 週 / ${activityKey} 的進度嗎？`);
                    if (!confirmed) return;

                    btn.disabled = true;
                    const { error } = await supabase.rpc("admin_reset_progress", {
                        p_user_id: userId,
                        p_week_code: weekCode,
                        p_activity_key: activityKey
                    });

                    if (error) {
                        showNotice(`重設失敗：${error.message}`, "error");
                        btn.disabled = false;
                        return;
                    }

                    showNotice("已重設該筆進度。", "success");
                    await loadProgress();
                });
            });
        }

        async function signInWithGoogle() {
            if (window.location.protocol === "file:") {
                alert("請改用 http://localhost:3000 或正式站開啟，登入功能不支援直接開檔。");
                return;
            }

            const { error } = await supabase.auth.signInWithOAuth({
                provider: "google",
                options: {
                    redirectTo: getAdminRedirectUrl(),
                    queryParams: { prompt: "select_account" }
                }
            });

            if (error) {
                showNotice(`登入啟動失敗：${error.message}`, "error");
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        function updateAuthUI() {
            if (!currentSession?.user) {
                authStatusEl.textContent = "尚未登入";
                loginBtn.classList.remove("hidden");
                logoutBtn.classList.add("hidden");
                tbodyEl.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-4 py-12 text-center font-bold text-slate-400">請先登入教師帳號</td>
                    </tr>
                `;
                summaryTextEl.textContent = "尚未讀取資料";
                renderVisibilityControls([]);
                return;
            }

            authStatusEl.textContent = currentSession.user.email || "Google 使用者";
            loginBtn.classList.add("hidden");
            logoutBtn.classList.remove("hidden");
        }

        async function loadProgress() {
            if (!currentSession?.user) return;

            if (!isTeacher(currentSession)) {
                tbodyEl.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-4 py-12 text-center font-bold text-rose-400">目前登入帳號不在教師白名單內</td>
                    </tr>
                `;
                summaryTextEl.textContent = "目前沒有教師權限";
                showNotice("目前登入帳號不在教師白名單內。若要授權其他教師，請同步更新 SQL 與前端白名單。", "error");
                renderVisibilityControls([]);
                return;
            }

            hideNotice();
            summaryTextEl.textContent = "讀取資料中...";
            tbodyEl.innerHTML = `
                <tr>
                    <td colspan="9" class="px-4 py-12 text-center font-bold text-slate-400">正在讀取資料...</td>
                </tr>
            `;

            const completedFilterValue = completedFilterEl.value === ""
                ? null
                : completedFilterEl.value === "true";

            const { data, error } = await supabase.rpc("admin_list_progress", {
                p_week_code: weekFilterEl.value || null,
                p_activity_type: activityFilterEl.value || null,
                p_search: searchFilterEl.value.trim() || null,
                p_completed: completedFilterValue
            });

            if (error) {
                tbodyEl.innerHTML = `
                    <tr>
                        <td colspan="9" class="px-4 py-12 text-center font-bold text-rose-400">讀取教師後台資料失敗</td>
                    </tr>
                `;
                summaryTextEl.textContent = "資料讀取失敗";
                showNotice(`讀取教師後台資料失敗：${error.message}`, "error");
                return;
            }

            renderRows(data || []);
        }

        async function loadWeekVisibility() {
            if (!currentSession?.user) {
                renderVisibilityControls([]);
                return;
            }

            if (!isTeacher(currentSession)) {
                renderVisibilityControls([]);
                return;
            }

            const { data, error } = await supabase.rpc("admin_list_week_visibility");
            if (error) {
                showNotice(`卡片狀態讀取失敗：${error.message}`, "error");
                return;
            }

            renderVisibilityControls(data || []);
        }

        loginBtn.addEventListener("click", signInWithGoogle);
        logoutBtn.addEventListener("click", signOut);
        refreshBtn.addEventListener("click", async () => {
            await loadProgress();
            await loadWeekVisibility();
        });
        weekFilterEl.addEventListener("change", loadProgress);
        activityFilterEl.addEventListener("change", loadProgress);
        completedFilterEl.addEventListener("change", loadProgress);
        searchFilterEl.addEventListener("input", () => {
            window.clearTimeout(searchFilterEl._debounceTimer);
            searchFilterEl._debounceTimer = window.setTimeout(loadProgress, 300);
        });

        initWeekOptions();

        const { data: sessionData } = await supabase.auth.getSession();
        currentSession = sessionData.session;
        updateAuthUI();
        await loadProgress();
        await loadWeekVisibility();

        supabase.auth.onAuthStateChange(async (_event, session) => {
            currentSession = session;
            updateAuthUI();
            await loadProgress();
            await loadWeekVisibility();
        });
    </script>
</body>
</html>
