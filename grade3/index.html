<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年級資訊課 - 網路探險家 (首頁)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdfa; /* 淺藍綠色背景，適合兒童 */
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-12">

    <!-- 頂部導航列 -->
    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-cyan-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="font-black text-gray-800 flex items-center text-lg">
                <i class="fa-solid fa-rocket text-cyan-600 mr-2"></i> 三年級資訊課
            </div>
            <div class="flex space-x-1 md:space-x-2 overflow-x-auto">
                <a href="index.html" class="px-3 py-1.5 text-sm font-bold bg-cyan-100 text-cyan-800 rounded-lg transition whitespace-nowrap">🏠 首頁</a>
                <a href="week03.html" class="px-3 py-1.5 text-sm font-bold text-gray-600 hover:text-cyan-600 hover:bg-cyan-50 rounded-lg transition whitespace-nowrap">第 3 週</a>
                <a href="week04.html" class="px-3 py-1.5 text-sm font-bold text-gray-600 hover:text-cyan-600 hover:bg-cyan-50 rounded-lg transition whitespace-nowrap">第 4 週</a>
            </div>
        </div>
    </nav>

    <!-- Header 頂部標題區 -->
    <header class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white shadow-xl rounded-b-[3rem] mb-12">
        <div class="max-w-5xl mx-auto px-6 py-12 relative overflow-hidden">
            <div class="relative z-10 text-center">
                <div class="inline-block bg-yellow-400 text-yellow-900 font-bold px-4 py-1.5 rounded-full text-sm mb-4 shadow-sm">
                    <i class="fa-solid fa-star mr-1 text-yellow-100"></i> 114學年度第二學期
                </div>
                <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-4 drop-shadow-md">網路探險家 🚀</h1>
                <p class="text-xl md:text-2xl text-cyan-50 font-medium drop-shadow">跟著老師一起尋找看不見的網路魔法！</p>
            </div>
            <i class="fa-solid fa-earth-asia absolute text-white opacity-10 text-9xl -top-5 -left-10 transform -rotate-12"></i>
            <i class="fa-solid fa-wifi absolute text-white opacity-20 text-8xl -bottom-5 right-10 transform rotate-12"></i>
        </div>
    </header>

    <!-- Main Content 主要內容區 -->
    <main class="max-w-5xl mx-auto px-6">
        
        <!-- 電子書快速連結 (全學期通用資源) -->
        <section class="bg-gradient-to-r from-orange-400 to-amber-400 rounded-3xl shadow-md overflow-hidden card-hover border-4 border-white mb-10">
            <a href="https://book.eduweb.com.tw/e1d1u4/vips091/html/lesson.html#1" target="_blank" class="block p-6 md:flex items-center justify-between">
                <div class="flex items-center mb-4 md:mb-0">
                    <div class="bg-white/30 p-4 rounded-full mr-5 shadow-inner">
                        <i class="fa-solid fa-book-open-reader text-white text-3xl"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-1 drop-shadow-sm">打開線上魔法課本！</h3>
                        <p class="text-orange-50 font-medium">忘記帶課本嗎？點擊這裡可以開啟彩色電子書喔！</p>
                    </div>
                </div>
                <div class="bg-white text-orange-600 px-8 py-3 rounded-full font-black text-lg shadow-lg flex items-center justify-center hover:bg-orange-50 transition transform hover:scale-105">
                    出發看書去 <i class="fa-solid fa-paper-plane ml-2"></i>
                </div>
            </a>
        </section>

        <div class="flex items-center mb-8 border-b-2 border-cyan-200 pb-2">
            <i class="fa-solid fa-map text-3xl text-cyan-600 mr-3"></i>
            <h2 class="text-3xl font-black text-gray-800">探險地圖 (課程進度)</h2>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            
            <!-- 第 3 週卡片 -->
            <a href="week03.html" class="block bg-white rounded-3xl shadow-md border-4 border-transparent hover:border-blue-300 overflow-hidden card-hover group">
                <div class="h-32 bg-gradient-to-r from-blue-400 to-cyan-500 relative flex items-center justify-center">
                    <i class="fa-solid fa-shield-cat text-6xl text-white opacity-50 transform group-hover:scale-110 transition duration-500"></i>
                    <div class="absolute top-4 left-4 bg-white/20 backdrop-blur-sm text-white px-3 py-1 rounded-full font-bold text-sm">第 03 週</div>
                </div>
                <div class="p-6">
                    <h3 class="text-2xl font-black text-gray-800 mb-2 group-hover:text-blue-600 transition">網路安全與魔法</h3>
                    <p class="text-gray-600 font-medium mb-4">認識網路安全小常識，並學習超強的鍵盤魔法：複製與貼上！</p>
                    <div class="flex flex-wrap gap-2">
                        <span class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded-md font-bold">資安影片</span>
                        <span class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded-md font-bold">Ctrl+C/V/Z</span>
                        <span class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded-md font-bold">網址連連看</span>
                    </div>
                </div>
            </a>

            <!-- 第 4 週卡片 -->
            <a href="week04.html" class="block bg-white rounded-3xl shadow-md border-4 border-transparent hover:border-teal-300 overflow-hidden card-hover group">
                <div class="h-32 bg-gradient-to-r from-teal-400 to-emerald-500 relative flex items-center justify-center">
                    <i class="fa-brands fa-chrome text-6xl text-white opacity-50 transform group-hover:scale-110 transition duration-500"></i>
                    <div class="absolute top-4 left-4 bg-white/20 backdrop-blur-sm text-white px-3 py-1 rounded-full font-bold text-sm">第 04 週</div>
                </div>
                <div class="p-6">
                    <h3 class="text-2xl font-black text-gray-800 mb-2 group-hover:text-teal-600 transition">中打與瀏覽器任意門</h3>
                    <p class="text-gray-600 font-medium mb-4">進入中打修煉場找回注音手感，並學會駕駛瀏覽器任意門去任何網站！</p>
                    <div class="flex flex-wrap gap-2">
                        <span class="text-xs bg-teal-50 text-teal-600 border border-teal-200 px-2 py-1 rounded-md font-bold">中打修煉</span>
                        <span class="text-xs bg-teal-50 text-teal-600 border border-teal-200 px-2 py-1 rounded-md font-bold">精準複製</span>
                        <span class="text-xs bg-teal-50 text-teal-600 border border-teal-200 px-2 py-1 rounded-md font-bold">魔王關卡</span>
                    </div>
                </div>
            </a>

            <!-- 未來週次預留框 -->
            <div class="block bg-cyan-50 rounded-3xl border-4 border-dashed border-cyan-200 overflow-hidden opacity-70">
                <div class="h-full min-h-[250px] flex flex-col items-center justify-center text-cyan-600 p-6 text-center">
                    <i class="fa-solid fa-lock text-4xl mb-3 opacity-50"></i>
                    <h3 class="text-xl font-bold mb-1">即將解鎖</h3>
                    <p class="text-sm font-medium opacity-80">下週的尋寶任務還在準備中...</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center mt-16 pb-8 text-gray-400 text-sm font-medium">
        <p><i class="fa-solid fa-rocket mr-1"></i> 新北市頂溪國小資訊課 - 小小探險家系列</p>
    </footer>

</body>
</html>
