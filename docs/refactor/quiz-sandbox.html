<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Module Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .opt-btn.selected {
            border-color: #fb7185;
            background: #fff1f2;
            color: #be123c;
        }

        .opt-btn.correct {
            border-color: #22c55e;
            background: #dcfce7;
            color: #166534;
        }

        .opt-btn.wrong {
            border-color: #ef4444;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-4xl px-6 py-10">
        <header class="mb-8">
            <p class="font-black tracking-wide text-sky-700">Refactor Sandbox</p>
            <h1 class="mt-2 text-4xl font-black">Quiz Module Sandbox</h1>
            <p class="mt-3 leading-relaxed text-slate-600">
                This page validates <code>shared/quiz-module.js</code> in isolation.
                It uses fake sign-in and localStorage only.
            </p>
        </header>

        <section class="mb-8 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex flex-wrap items-center gap-3">
                <button id="sandbox-sign-in" type="button" class="rounded-2xl bg-sky-600 px-5 py-3 font-black text-white hover:bg-sky-700">
                    Fake Sign In
                </button>
                <button id="sandbox-sign-out" type="button" class="rounded-2xl bg-slate-700 px-5 py-3 font-black text-white hover:bg-slate-800">
                    Fake Sign Out
                </button>
                <button id="sandbox-reset" type="button" class="rounded-2xl bg-amber-500 px-5 py-3 font-black text-white hover:bg-amber-600">
                    Clear Saved Result
                </button>
                <span id="sandbox-auth-status" class="ml-auto rounded-full bg-slate-100 px-4 py-2 font-bold text-slate-700">
                    Signed out
                </span>
            </div>
        </section>

        <section class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
            <div id="quiz-lock" class="rounded-2xl border-2 border-dashed border-rose-300 bg-rose-50 p-6 text-center">
                <p class="text-xl font-black text-rose-700">Sign in to unlock the quiz.</p>
            </div>

            <div id="quiz-content" class="hidden">
                <div id="quiz-status-banner" class="mb-6 hidden rounded-2xl border-2 border-emerald-300 bg-emerald-50 px-5 py-4">
                    <p id="quiz-status-text" class="font-black text-emerald-800"></p>
                </div>

                <div id="quiz-container" class="space-y-6"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initQuizModule } from "../../shared/quiz-module.js";

        const STORAGE_KEY = "quiz-sandbox-progress";
        let currentUser = null;

        const authStatusEl = document.getElementById("sandbox-auth-status");
        const signInBtn = document.getElementById("sandbox-sign-in");
        const signOutBtn = document.getElementById("sandbox-sign-out");
        const resetBtn = document.getElementById("sandbox-reset");

        const questions = [
            {
                id: 1,
                questionHtml: "What should a student do before leaving a shared school computer?",
                options: [
                    { text: "Close the browser only", correct: false },
                    { text: "Sign out first, then leave", correct: true },
                    { text: "Ask classmates to watch it", correct: false },
                    { text: "Shut down without signing out", correct: false }
                ]
            },
            {
                id: 2,
                questionHtml: "Which website should a child avoid?",
                options: [
                    { text: "School learning portal", correct: false },
                    { text: "Library e-book platform", correct: false },
                    { text: "Violent or sexual content site", correct: true },
                    { text: "District education site", correct: false }
                ]
            },
            {
                id: 3,
                questionHtml: "If someone you only know online invites you to meet alone, what should you do?",
                options: [
                    { text: "Go secretly", correct: false },
                    { text: "Tell a trusted adult and refuse", correct: true },
                    { text: "Invite another child only", correct: false },
                    { text: "Keep it private", correct: false }
                ]
            }
        ];

        function readSavedProgress() {
            try {
                const raw = window.localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (_error) {
                return null;
            }
        }

        function writeSavedProgress(progress) {
            window.localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        function clearSavedProgress() {
            window.localStorage.removeItem(STORAGE_KEY);
        }

        function updateAuthBadge() {
            authStatusEl.textContent = currentUser ? currentUser.email : "Signed out";
        }

        const quiz = initQuizModule({
            questions,
            selectors: {
                lock: "quiz-lock",
                content: "quiz-content",
                container: "quiz-container",
                statusBanner: "quiz-status-banner",
                statusText: "quiz-status-text"
            },
            messages: {
                questionLabel: (index) => `Q${index}`,
                submitButton: "Submit Answers",
                submittedButton: "Submitted",
                unansweredAlert: (remaining) => `You still have ${remaining} unanswered question(s).`,
                scoreLabel: (correct, total) => `Score: ${correct} / ${total}`,
                completedBanner: (score, total) => `Completed. Score: ${score ?? "?"} / ${total}`,
                unauthenticated: "Sign in to unlock the quiz.",
                resultMessages: {
                    perfect: ["🏆", "Perfect score. The shared quiz core works."],
                    great: ["🎉", "Great work. The quiz flow looks healthy."],
                    good: ["👍", "Good progress. The core flow is usable."],
                    retry: ["🔁", "Try again. The module is still interactive."]
                }
            },
            loadProgress: async () => readSavedProgress(),
            saveProgress: async (score) => {
                writeSavedProgress({ completed: true, score });
                return true;
            },
            getCurrentUser: async () => currentUser,
            onRequireLogin: async () => {
                window.alert("This sandbox uses a fake sign-in button.");
            }
        });

        signInBtn.addEventListener("click", async () => {
            currentUser = { id: "sandbox-user", email: "teacher@example.com" };
            updateAuthBadge();
            await quiz.handleAuthChange({ user: currentUser });
        });

        signOutBtn.addEventListener("click", async () => {
            currentUser = null;
            updateAuthBadge();
            await quiz.handleAuthChange(null);
        });

        resetBtn.addEventListener("click", async () => {
            clearSavedProgress();
            window.location.reload();
        });

        window.selectOption = function selectOption(questionId, buttonEl) {
            quiz.selectOption(questionId, buttonEl);
        };

        window.submitQuiz = async function submitQuiz() {
            await quiz.submit();
        };

        updateAuthBadge();
        quiz.handleAuthChange(null);
    </script>
</body>
</html>
