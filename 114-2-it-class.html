    <!-- Chosen Palette: Warm Neutrals & Educational Indigos -->
    <!-- Application Structure Plan: The application uses a "Master-Detail Dashboard" architecture. The left panel acts as the 'Master' navigator, displaying the semester schedule and allowing users to toggle between Grade 3 and Grade 6. The right panel acts as the 'Detail' view, dynamically displaying the specific lesson plan for the selected week. This structure was chosen because the source report functions as a high-level syllabus mapped to specific detailed lesson plans; a dashboard perfectly facilitates jumping between the macro-schedule and micro-lesson views without losing context. -->
    <!-- Visualization & Content Choices: Source Report Info -> Lesson Time Breakdown Goal -> Display proportion of 40-min class spent on each activity -> Doughnut Chart (Chart.js) -> Hover interaction for exact minutes -> Justification: Doughnut charts effectively show parts-to-whole relationships for time allocation within a strict 40-minute boundary. NO SVG or Mermaid used; Chart.js canvas handles the visualization. HTML/CSS used for timeline lists. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>

            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }

            margin-left: auto;

    </header>

        let currentGrade = 'grade3';
        let currentChart = null;

        function switchGrade(grade) {
            currentGrade = grade;
            
            document.getElementById('btn-grade3').className = grade === 'grade3' ? 'px-6 py-2 rounded-md font-bold text-sm transition-colors duration-200 tab-active' : 'px-6 py-2 rounded-md font-bold text-sm transition-colors duration-200 tab-inactive';
            document.getElementById('btn-grade6').className = grade === 'grade6' ? 'px-6 py-2 rounded-md font-bold text-sm transition-colors duration-200 tab-active' : 'px-6 py-2 rounded-md font-bold text-sm transition-colors duration-200 tab-inactive';
            
            const data = curriculumData[grade];
            document.getElementById('grade-theme').innerText = data.theme;
            document.getElementById('grade-materials').innerText = data.materials;
            
            renderSchedule();
            hideDetail();
        }

        function renderSchedule() {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = '';
            
            const schedule = curriculumData[currentGrade].schedule;
            
            schedule.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `schedule-item p-4 rounded-xl mb-3 border-l-4 border-transparent transition-all duration-200 ${item.hasDetail ? 'bg-white shadow-sm border border-slate-100' : 'bg-slate-50 opacity-70'}`;
                div.id = `sched-item-${item.week}`;
                
                const detailIcon = item.hasDetail ? '<span class="bg-indigo-100 text-indigo-600 text-xs px-2 py-0.5 rounded font-bold">&#128221; 教案</span>' : '';
                
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <div class="text-xs font-black text-slate-400">第 ${item.week} 週 <span class="font-normal mx-1">|</span> ${item.date}</div>
                        ${detailIcon}
                    </div>
                    <div class="font-bold text-slate-800 text-lg mb-1">${item.topic}</div>
                    <div class="text-sm text-slate-500">${item.desc}</div>
                `;
                
                if (item.hasDetail) {
                    div.onclick = () => showDetail(item.week);
                }
                
                listContainer.appendChild(div);
            });
        }

        function hideDetail() {
            document.getElementById('detail-empty').classList.remove('hidden');
            document.getElementById('detail-content').classList.add('hidden');
            
            document.querySelectorAll('.schedule-item').forEach(el => {
                el.classList.remove('schedule-active');
            });
        }

        function showDetail(week) {
            document.querySelectorAll('.schedule-item').forEach(el => {
                el.classList.remove('schedule-active');
            });
            document.getElementById(`sched-item-${week}`).classList.add('schedule-active');
            
            const lesson = curriculumData[currentGrade].lessons[week];
            if (!lesson) return;

            document.getElementById('detail-empty').classList.add('hidden');
            document.getElementById('detail-content').classList.remove('hidden');

            document.getElementById('detail-week-badge').innerText = `第 ${week} 週`;
            document.getElementById('detail-time-val').innerText = lesson.time;
            document.getElementById('detail-title').innerText = lesson.title;

            const goalsList = document.getElementById('detail-goals');
            goalsList.innerHTML = lesson.goals.map(g => `<li><span class="text-indigo-400 mr-2">&#10004;</span>${g}</li>`).join('');

            const flowContainer = document.getElementById('detail-flow');
            flowContainer.innerHTML = lesson.flow.map((step, idx) => `
                <div class="relative flex items-start md:justify-center">
                    <div class="hidden md:block w-1/2 pr-8 text-right">
                        <div class="text-sm font-bold text-indigo-600 mb-1">${step.minutes} 分鐘</div>
                        <div class="font-black text-slate-800">${step.name}</div>
                    </div>
                    <div class="absolute left-0 md:left-1/2 -translate-x-1/2 w-10 h-10 rounded-full bg-white border-4 border-indigo-200 flex items-center justify-center font-black text-indigo-600 z-10 shadow-sm">${idx + 1}</div>
                    <div class="w-full md:w-1/2 pl-14 md:pl-8">
                        <div class="md:hidden flex items-baseline gap-2 mb-1">
                            <span class="text-sm font-bold text-white bg-indigo-500 px-2 rounded-md">${step.minutes}'</span>
                            <span class="font-black text-slate-800">${step.name}</span>
                        </div>
                        <div class="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm leading-relaxed">${step.desc}</div>
                    </div>
                </div>
            `).join('');

            if (lesson.notes) {
                document.getElementById('detail-notes-container').classList.remove('hidden');
                document.getElementById('detail-notes').innerText = lesson.notes;
            } else {
                document.getElementById('detail-notes-container').classList.add('hidden');
            }

            renderChart(lesson.flow);
            
            if(window.innerWidth < 768) {
                document.getElementById('detail-content').scrollIntoView({behavior: 'smooth'});
            }
        }

        function renderChart(flowData) {
            const ctx = document.getElementById('timeAllocationChart').getContext('2d');
            
            if (currentChart) {
                currentChart.destroy();
            }

            const labels = flowData.map(f => f.name);
            const data = flowData.map(f => f.minutes);
            const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e'];

            currentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors.slice(0, data.length),
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: 10
                    },
                    plugins: {
                        legend: {
                            position: window.innerWidth < 640 ? 'bottom' : 'right',
                            labels: {
                                font: { family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                                color: '#475569',
                                padding: 20,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: "'Noto Sans TC', sans-serif", size: 14 },
                            bodyFont: { family: "'Noto Sans TC', sans-serif", size: 14, weight: 'bold' },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.label}: ${context.raw} 分鐘`;
                                }
                            }
                        }
                    },
                    cutout: '65%'
                }
            });
        }

        window.addEventListener('resize', () => {
            if(currentChart) {
                currentChart.options.plugins.legend.position = window.innerWidth < 640 ? 'bottom' : 'right';
                currentChart.update();
            }
        });

        // Initialize
        switchGrade('grade3');
    </script>
</body>
</html>
